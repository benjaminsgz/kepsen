micronaut.application.name=kepsen
grpc.server.port=50051
grpc.server.max-inbound-message-size=4194304
grpc.server.keep-alive-time=60s
grpc.server.keep-alive-timeout=20s

mtls.server.enabled=true
mtls.server.cert-chain=${MTLS_SERVER_CERT:`file:certs/dev/server.crt`}
mtls.server.private-key=${MTLS_SERVER_KEY:`file:certs/dev/server.key`}
mtls.server.trust-cert-collection=${MTLS_TRUST_CA:`file:certs/dev/ca.crt`}

service-acl.enabled=true
service-acl.default-action=deny
service-acl.identity-source=san-uri
service-acl.rules[0].method=uk.sienne.KepsenService/send
service-acl.rules[0].allowed-clients[0]=spiffe://internal/ns/default/sa/service-a
service-acl.rules[1].method=uk.sienne.KepsenService/*
service-acl.rules[1].allowed-clients[0]=spiffe://internal/ns/default/sa/service-b

name: Snapshot

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Snapshot version to publish"
        required: false
        default: "0.1.0-SNAPSHOT"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      - name: Derive snapshot version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SNAPSHOT_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "SNAPSHOT_VERSION=0.1.0-SNAPSHOT" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: ./gradlew clean build --no-daemon

      - name: Publish snapshot to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./gradlew publish --no-daemon -PsnapshotVersion="${SNAPSHOT_VERSION}"
